name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          zip -r "StockMarketCalendar-${{ steps.version.outputs.VERSION }}.zip" . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "*__pycache__*" \
            --exclude "*.pyc"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## What's Changed

            See the full [changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for all commits included in this release.

            ## Download

            Download the ZIP archive attached below and follow the [installation instructions](https://github.com/${{ github.repository }}#installation--step-by-step) in the README.
          files: "StockMarketCalendar-${{ steps.version.outputs.VERSION }}.zip"
          draft: false
          prerelease: false
